# 生产环境请按部署实际情况修改下列取值
server.port=8888

spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=1800000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-wait=-1
spring.redis.lettuce.pool.max-idle=5
spring.redis.lettuce.pool.min-idle=0

spring.datasource.url=jdbc:mysql://localhost:3306/yin_music?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

minio.endpoint=http://127.0.0.1:9000
minio.access-key=
minio.secret-key=
minio.bucket-name=

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

app.security.cors.allowed-origins=https://your-frontend.example.com
app.security.login.max-failed-attempts=5
app.security.login.lock-minutes=10

app.password-reset.mock-without-mail=false
app.password-reset.expose-code=false
app.password-reset.code-ttl-minutes=10
app.password-reset.send-cooldown-seconds=60

